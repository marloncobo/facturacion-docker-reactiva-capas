# Define explícitamente el nombre del Stack para que sea único
name: facturacion-reactiva
version: "3.8"

services:
  app:
    build: .
    # 1. Cambiamos el nombre y añadimos un tag específico para la versión reactiva
    image: facturacion-app:webflux
    ports:
      - "8080:8080"
    environment:
      # 2. Cambiamos el protocolo de conexión de 'jdbc' a 'r2dbc'
      DATABASE_URL: r2dbc:mysql://db:3306/facturacion
      DATABASE_USERNAME: user
      DATABASE_PASSWORD: password
    depends_on:
      - db

  db:
    # 3. Es buena práctica ponerle nombre a la imagen de la BD si no quieres que sea genérica
    image: mysql:8.0
    container_name: facturacion-db-webflux
    restart: always
    environment:
      MYSQL_ROOT_PASSWORD: rootpassword
      MYSQL_DATABASE: facturacion
      MYSQL_USER: user
      MYSQL_PASSWORD: password
    ports:
      - "3307:3306"
    volumes:
      - db_data_webflux:/var/lib/mysql

volumes:
  db_data_webflux: